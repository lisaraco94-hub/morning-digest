# ── WHO YOU ARE — describe yourself in natural language ──────────────────────
# This is the most important field. Be specific: your role, what you sell/build,
# who your competitors are, which markets you watch. Claude uses this verbatim
# to score every article for relevance to you.

user_name: "Alex"
organization: "LabTech Inc."   # shown in the HTML header and footer

profile: |
  I am Alex Chen, Business Development Manager at LabTech Inc., a mid-size
  distributor of clinical laboratory automation solutions across Southeast Asia.

  Products we distribute:
  - TLA systems: track-based automation connecting various analyzers
  - Pre-analytical modules: tube sorting, decapping, centrifugation
  - LIS/middleware: laboratory information system integrations
  - Digital pathology: whole slide imaging and AI-assisted diagnosis

  Core monitoring interests:
  - IVD market: new product launches, M&A, regulatory changes (FDA, CE, IVDR)
  - Competitors: Siemens Healthineers, Roche Diagnostics, Abbott, Beckman Coulter,
    Sysmex, bioMérieux, Mindray, Horiba, Hitachi High-Tech
  - Markets: Southeast Asia (Singapore, Malaysia, Thailand, Indonesia, Vietnam),
    China, Japan, India
  - AI applied to diagnostics and laboratory — not generic AI news
  - Scientific literature: lab automation, pre-analytical errors, TAT, AI in IVD

