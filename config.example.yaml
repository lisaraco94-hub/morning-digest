    section: "IVD & Lab Automation"
  - q: "clinical laboratory diagnostics new product 2026"
    section: "IVD & Lab Automation"
  - q: "in vitro diagnostics market 2026"
    section: "IVD & Lab Automation"
  - q: "medtech diagnostics deal acquisition"
    section: "IVD & Lab Automation"
  - q: "laboratory information system LIS software"
    section: "IVD & Lab Automation"
  - q: "IVDR EU in vitro diagnostic regulation"
    section: "IVD & Lab Automation"
  - q: "pre-analytical errors laboratory patient safety"
    section: "IVD & Lab Automation"
