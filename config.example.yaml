# ── GOOGLE NEWS RSS — seed queries (always included as fallback) ──────────────
# Haiku generates additional optimized queries at runtime; these guarantee
# minimum coverage if the AI-generated ones are discarded by validation.
# Style: journalistic, max 6 words, company name + 1-2 topic words.
