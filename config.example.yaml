# ── SPECIALIZED RSS FEEDS ─────────────────────────────────────────────────────
rss_feeds:
  - url: "https://www.darkdaily.com/feed"
    section: "IVD & Lab Automation"
  - url: "https://www.fiercebiotech.com/rss/xml"
    section: "Biotech & Digital Health"

# ── SCIENTIFIC LITERATURE ──────────────────────────────────────────────────────
arxiv:
  categories:
    - "q-bio.QM"   # quantitative methods in biology
    - "cs.LG"      # machine learning (filter applied downstream by Sonnet)
    - "eess.IV"    # image/video processing (diagnostic imaging)
  lookback_days: 7
  max_papers: 15

pubmed:
  queries:
    - "total laboratory automation pre-analytical"
    - "turnaround time TAT clinical laboratory improvement"
    - "in vitro diagnostics artificial intelligence"
    - "pre-analytical errors hemolysis icterus lipemia"
    - "point-of-care testing POCT clinical outcome"
    - "digital pathology whole slide imaging laboratory"
  lookback_days: 7
  max_results: 15

# ── OUTPUT ─────────────────────────────────────────────────────────────────────
output:
  # Path where the HTML is written each morning
  html_path: "~/Desktop/digest_today.html"
  # Local archive folder (relative to this script) — one HTML copy per day
  archive_dir: "archive"
  # Obsidian vault root path — leave empty to disable Obsidian features
  obsidian_vault: ""
  # Subfolder inside vault where manually imported articles are saved
  obsidian_import_folder: "Saved"
  # Vault notes to read for richer search context (paths relative to vault root)
  # Example: "_Work/competitors.md", "_Work/products.md"
  obsidian_context_notes: []

# Keywords used to extract relevant lines from Obsidian context notes
vault_context_keywords:
  - "automation"
  - "competitor"
  - "market"
  - "acquisition"
  - "product"
  - "launch"
  - "FDA"
  - "laboratory"

# ── MODEL ──────────────────────────────────────────────────────────────────────
# Model used for scoring and report writing. Haiku is always used for planning
# (cheaper). Sonnet is the recommended default for the scoring/writing phase.
model: "claude-sonnet-4-6"
